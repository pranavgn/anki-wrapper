[package]
edition = "2024"
name = "burn-core"
version = "0.17.1"
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Flexible and Comprehensive Deep Learning Framework in Rust"
documentation = "https://docs.rs/burn-core"
readme = "README.md"
keywords = [
    "deep-learning",
    "machine-learning",
    "tensor",
    "pytorch",
    "ndarray",
]
categories = [
    "science",
    "no-std",
    "embedded",
    "wasm",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-core"
resolver = "2"

[package.metadata.docs.rs]
features = ["doc"]
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
audio = ["burn-dataset?/audio"]
dataset = ["burn-dataset"]
default = [
    "std",
    "burn-common/default",
    "burn-dataset?/default",
    "burn-tensor/default",
]
doc = [
    "std",
    "dataset",
    "audio",
    "vision",
    "burn-common/doc",
    "burn-dataset/doc",
    "burn-tensor/doc",
]
experimental-named-tensor = ["burn-tensor/experimental-named-tensor"]
network = ["burn-common/network"]
record-item-custom-serde = [
    "thiserror",
    "regex",
]
sqlite = ["burn-dataset?/sqlite"]
sqlite-bundled = ["burn-dataset?/sqlite-bundled"]
std = [
    "bincode/std",
    "burn-common/std",
    "burn-tensor/std",
    "flate2",
    "half/std",
    "log",
    "rand/std",
    "rmp-serde",
    "serde/std",
    "serde_json/std",
    "num-traits/std",
]
test-cuda = ["burn-cuda/default"]
test-rocm = ["burn-rocm/default"]
test-tch = ["burn-tch/default"]
test-wgpu = ["burn-wgpu/default"]
test-wgpu-spirv = [
    "burn-wgpu/default",
    "burn-wgpu/vulkan",
]
vision = [
    "burn-dataset?/vision",
    "burn-common/network",
]

[lib]
name = "burn_core"
path = "src/lib.rs"

[[test]]
name = "test_derive_config"
path = "tests/test_derive_config.rs"

[[test]]
name = "test_derive_module"
path = "tests/test_derive_module.rs"

[[test]]
name = "test_derive_record"
path = "tests/test_derive_record.rs"

[[test]]
