<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anki-wrapper</title>
  </head>
  <body>
    <div id="app">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-base,#F0EBE3);">
        <div style="width:200px;height:3px;border-radius:2px;background:var(--bg-subtle,#EDE9E3);overflow:hidden;">
          <div style="height:100%;width:40%;border-radius:2px;background:var(--accent,#8B7355);animation:bar 1.8s ease-in-out infinite;"></div>
        </div>
      </div>
      <style>@keyframes bar{0%{transform:translateX(-100%)}50%{transform:translateX(150%)}100%{transform:translateX(-100%)}}</style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
