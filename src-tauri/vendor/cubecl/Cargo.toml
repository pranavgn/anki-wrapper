[package]
edition = "2024"
name = "cubecl"
version = "0.5.0"
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Multi-platform high-performance compute language extension for Rust."
readme = "README.md"
keywords = [
    "gpu",
    "cuda",
    "wgpu",
    "gpgpu",
    "tensor",
]
categories = [
    "science",
    "mathematics",
    "algorithms",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/tracel-ai/cubecl"
resolver = "2"

[features]
autotune-checks = ["cubecl-runtime/autotune-checks"]
compilation-cache = [
    "cubecl-cuda?/compilation-cache",
    "cubecl-hip?/compilation-cache",
]
cuda = ["cubecl-cuda"]
default = [
    "std",
    "linalg",
    "cubecl-core/default",
    "cubecl-cuda?/default",
    "cubecl-hip?/default",
    "cubecl-wgpu?/default",
]
exclusive-memory-only = ["cubecl-wgpu?/exclusive-memory-only"]
hip = ["cubecl-hip"]
hip-intrinsic = ["cubecl-hip?/wmma-intrinsics"]
linalg = ["dep:cubecl-linalg"]
reduce = ["dep:cubecl-reduce"]
std = [
    "cubecl-core/std",
    "cubecl-wgpu?/std",
    "cubecl-cuda?/std",
]
template = ["cubecl-core/template"]
wgpu = ["cubecl-wgpu"]
wgpu-msl = [
    "wgpu",
    "cubecl-wgpu/msl",
]
wgpu-spirv = [
    "wgpu",
    "cubecl-wgpu/spirv",
]

[lib]
name = "cubecl"
path = "src/lib.rs"

[[bench]]
name = "conv2d"
path = "benches/conv2d.rs"
harness = false

[[bench]]
name = "matmul"
path = "benches/matmul.rs"
harness = false

[[bench]]
name = "memcpy_async"
path = "benches/memcpy_async.rs"
harness = false

[[bench]]
name = "unary"
